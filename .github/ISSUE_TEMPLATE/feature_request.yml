name: Feature request
description: Suggest a new tool or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: For new tools, name the yahooquery attribute/endpoint if you know it.
    validations:
      required: true
