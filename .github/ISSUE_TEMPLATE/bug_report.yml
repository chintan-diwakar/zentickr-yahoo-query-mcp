name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      placeholder: |
        1. Configure zentickr in Claude Desktop
        2. Ask: "..."
        3. Tool call get_...("...") returns ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Zentickr version or commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Python version, OS, and MCP client
    validations:
      required: true
